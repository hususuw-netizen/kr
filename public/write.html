<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新增單字卡</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <h1>韓文單字卡工作台</h1>
          <p id="write-now"></p>
        </div>
        <nav class="nav">
          <a class="active" href="write.html">新增單字卡</a>
          <a href="study.html">背單字模式</a>
          <a class="daily-link" href="daily.html">每日隨機模式</a>
        </nav>
      </header>

      <section class="layout">
        <section class="panel">
          <h2 id="write-form-title">新增單字卡</h2>
          <form id="card-form" class="stack">
            <div class="field">
              <label for="korean">韓文單字</label>
              <input id="korean" name="korean" placeholder="例如: 학교" required />
            </div>

            <div class="field">
              <div class="meaning-header">
                <label>中文意思</label>
                <button id="add-meaning" class="ghost meaning-add" type="button" aria-label="新增更多意思">+</button>
              </div>
              <div id="meaning-list" class="meaning-list"></div>
            </div>

            <div class="field">
              <label>詞性</label>
              <div id="pos-picker" class="pos-picker">
                <button class="pos-option active" type="button" data-value="X">X</button>
                <button class="pos-option" type="button" data-value="n.">n.</button>
                <button class="pos-option" type="button" data-value="v.">v.</button>
                <button class="pos-option" type="button" data-value="adj.">adj.</button>
                <button class="pos-option" type="button" data-value="adv.">adv.</button>
              </div>
              <input id="part-of-speech" name="partOfSpeech" type="hidden" value="X" />
            </div>

            <div class="actions">
              <button id="google-meaning" class="ghost" type="button">Google 翻譯</button>
            </div>

            <div class="field">
              <label for="example">例句</label>
              <textarea id="example" name="example" placeholder="可選填"></textarea>
            </div>

            <div class="field">
              <label for="memo">備註</label>
              <textarea id="memo" name="memo" placeholder="可選填"></textarea>
            </div>

            <div class="actions">
              <button class="primary" type="submit">儲存單字卡</button>
            </div>
            <div id="write-status" class="status"></div>
          </form>
        </section>

        <aside class="panel">
          <h2>學習統計</h2>
          <div class="stack">
            <div class="stats stats-four">
              <div class="stat">
                <span>總單字數</span>
                <strong id="total-count">0</strong>
              </div>
              <div class="stat">
                <span>最高查看次數</span>
                <strong id="max-views-write">0</strong>
              </div>
              <div class="stat daily-stat">
                <span>今日隨機已背</span>
                <strong id="today-daily-studied">0</strong>
              </div>
            </div>

            <div class="field">
              <label for="search">搜尋單字卡</label>
              <input id="search" placeholder="搜尋韓文、中文、詞性、例句、備註" />
            </div>
          </div>
        </aside>
      </section>

      <section class="panel" style="margin-top: 20px;">
        <div class="toolbar">
          <h2>已建立的單字卡</h2>
          <a class="button-link ghost" href="study.html">前往背單字模式</a>
        </div>
        <div id="card-list" class="list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
